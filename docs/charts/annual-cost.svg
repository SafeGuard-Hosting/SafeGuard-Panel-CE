<svg width="920" height="360" viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect x="0" y="0" width="920" height="360" rx="16" fill="#0d1117" stroke="#1f2630" stroke-width="1"/>
  <text x="32" y="42" fill="#e6edf3" font-size="22" font-weight="700">Licensing cost per server, per year</text>
  <text x="32" y="66" fill="#8b949e" font-size="13">Competitor list pricing starts here and climbs with every account. SafeGuard Panel is $0 — forever.</text>

  <g font-size="13">
    <!-- SafeGuard $0 -->
    <text x="178" y="112" fill="#e6edf3" text-anchor="end" font-weight="700">SafeGuard Panel</text>
    <rect x="200" y="98" width="150" height="26" rx="13" fill="#1a7f53"/>
    <text x="275" y="116" fill="#2ee59d" text-anchor="middle" font-weight="700">$0 · FREE FOREVER</text>

    <!-- DirectAdmin ~$60/yr -->
    <text x="178" y="158" fill="#c9d1d9" text-anchor="end">DirectAdmin</text>
    <rect x="200" y="144" width="158" height="26" rx="5" fill="#3b4655"/>
    <text x="368" y="162" fill="#8b949e">from ~$5/mo · ~$60/yr ↑</text>

    <!-- Plesk ~$144/yr -->
    <text x="178" y="204" fill="#c9d1d9" text-anchor="end">Plesk</text>
    <rect x="200" y="190" width="380" height="26" rx="5" fill="#4a3b5a"/>
    <text x="590" y="208" fill="#8b949e">from ~$12/mo · ~$144/yr ↑</text>

    <!-- cPanel ~$192/yr -->
    <text x="178" y="250" fill="#c9d1d9" text-anchor="end">cPanel &amp; WHM</text>
    <rect x="200" y="236" width="507" height="26" rx="5" fill="#5a3636"/>
    <text x="717" y="254" fill="#8b949e">from ~$16/mo · ~$192/yr ↑</text>
  </g>

  <text x="32" y="300" fill="#e6edf3" font-size="14" font-weight="600">Run 10 servers? That's <tspan fill="#ff7b72">~$2,000/year</tspan> in cPanel licensing alone — or <tspan fill="#2ee59d">$0</tspan> with SafeGuard Panel.</text>
  <text x="32" y="332" fill="#6e7681" font-size="11">Representative published "from" list prices (lowest tier / fewest accounts), annualized; real cost rises with account count &amp; tier. SafeGuard Panel is free at every scale.</text>
</svg>
