<svg width="920" height="480" viewBox="0 0 920 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect x="0" y="0" width="920" height="480" rx="16" fill="#0d1117" stroke="#1f2630" stroke-width="1"/>
  <text x="32" y="42" fill="#e6edf3" font-size="22" font-weight="700">What one server's panel license costs you over time</text>
  <text x="32" y="66" fill="#8b949e" font-size="13">Cumulative licensing spend, per server. SafeGuard Panel stays flat on the floor: $0.</text>

  <!-- gridlines + Y ($) -->
  <g stroke="#1f2630" stroke-width="1">
    <line x1="120" y1="360" x2="840" y2="360"/>
    <line x1="120" y1="302" x2="840" y2="302"/>
    <line x1="120" y1="244" x2="840" y2="244"/>
    <line x1="120" y1="186" x2="840" y2="186"/>
    <line x1="120" y1="128" x2="840" y2="128"/>
    <line x1="120" y1="70" x2="840" y2="70"/>
  </g>
  <g fill="#6e7681" font-size="11" text-anchor="end">
    <text x="110" y="364">$0</text>
    <text x="110" y="306">$200</text>
    <text x="110" y="248">$400</text>
    <text x="110" y="190">$600</text>
    <text x="110" y="132">$800</text>
    <text x="110" y="74">$1,000</text>
  </g>

  <!-- X (years) -->
  <line x1="120" y1="360" x2="840" y2="360" stroke="#30363d" stroke-width="1.5"/>
  <g fill="#8b949e" font-size="12" text-anchor="middle">
    <text x="120" y="382">Year 1</text>
    <text x="300" y="382">Year 2</text>
    <text x="480" y="382">Year 3</text>
    <text x="660" y="382">Year 4</text>
    <text x="840" y="382">Year 5</text>
  </g>

  <!-- cPanel ~$192/yr -->
  <polyline points="120,304.3 300,248.6 480,193 660,137.3 840,81.6"
            fill="none" stroke="#ff7b72" stroke-width="3" stroke-linecap="round"/>
  <g fill="#ff7b72"><circle cx="120" cy="304.3" r="4"/><circle cx="300" cy="248.6" r="4"/><circle cx="480" cy="193" r="4"/><circle cx="660" cy="137.3" r="4"/><circle cx="840" cy="81.6" r="4.5"/></g>
  <text x="836" y="74" fill="#ff7b72" font-size="12.5" font-weight="700" text-anchor="end">cPanel · ~$960</text>

  <!-- Plesk ~$144/yr -->
  <polyline points="120,318.2 300,276.5 480,234.7 660,193 840,151.2"
            fill="none" stroke="#d2a8ff" stroke-width="3" stroke-linecap="round"/>
  <g fill="#d2a8ff"><circle cx="300" cy="276.5" r="4"/><circle cx="480" cy="234.7" r="4"/><circle cx="660" cy="193" r="4"/><circle cx="840" cy="151.2" r="4.5"/></g>
  <text x="836" y="144" fill="#d2a8ff" font-size="12.5" font-weight="700" text-anchor="end">Plesk · ~$720</text>

  <!-- DirectAdmin ~$60/yr -->
  <polyline points="120,342.6 300,325.2 480,307.8 660,290.4 840,273"
            fill="none" stroke="#79c0ff" stroke-width="3" stroke-linecap="round"/>
  <g fill="#79c0ff"><circle cx="840" cy="273" r="4.5"/></g>
  <text x="836" y="266" fill="#79c0ff" font-size="12.5" font-weight="700" text-anchor="end">DirectAdmin · ~$300</text>

  <!-- SafeGuard $0 flat -->
  <line x1="120" y1="360" x2="840" y2="360" stroke="#2ee59d" stroke-width="4" stroke-linecap="round"/>
  <circle cx="840" cy="360" r="5.5" fill="#2ee59d"/>
  <text x="128" y="352" fill="#2ee59d" font-size="13" font-weight="700">▬ SafeGuard Panel — $0 in year 1, $0 in year 5, $0 forever</text>

  <text x="32" y="430" fill="#e6edf3" font-size="14" font-weight="600">Multiply by your fleet: <tspan fill="#ff7b72">20 cPanel servers ≈ $19,000 over 5 years</tspan> — <tspan fill="#2ee59d">$0 with SafeGuard Panel.</tspan></text>
  <text x="32" y="462" fill="#6e7681" font-size="11">Based on representative "from" list pricing (lowest tier), annualized &amp; accumulated. Real cost is higher — it scales with account count &amp; tier.</text>
</svg>
