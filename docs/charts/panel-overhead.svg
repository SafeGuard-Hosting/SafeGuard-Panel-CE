<svg width="920" height="360" viewBox="0 0 920 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect x="0" y="0" width="920" height="360" rx="16" fill="#0d1117" stroke="#1f2630" stroke-width="1"/>
  <text x="32" y="42" fill="#e6edf3" font-size="22" font-weight="700">Control-panel overhead at idle</text>
  <text x="32" y="66" fill="#8b949e" font-size="13">RAM the panel's own services use — on top of the shared web stack everyone runs. Lower is better.</text>

  <!-- bars -->
  <g font-size="13">
    <!-- SafeGuard 67 -->
    <text x="148" y="112" fill="#e6edf3" text-anchor="end" font-weight="700">SafeGuard Panel</text>
    <rect x="160" y="98" width="43" height="26" rx="5" fill="#2ee59d"/>
    <text x="213" y="116" fill="#2ee59d" font-weight="700">67 MB · measured</text>

    <!-- DirectAdmin 250 -->
    <text x="148" y="158" fill="#c9d1d9" text-anchor="end">DirectAdmin</text>
    <rect x="160" y="144" width="159" height="26" rx="5" fill="#3b4655"/>
    <text x="329" y="162" fill="#8b949e">~250 MB</text>

    <!-- CyberPanel 400 -->
    <text x="148" y="204" fill="#c9d1d9" text-anchor="end">CyberPanel</text>
    <rect x="160" y="190" width="254" height="26" rx="5" fill="#3b4655"/>
    <text x="424" y="208" fill="#8b949e">~400 MB</text>

    <!-- Plesk 800 -->
    <text x="148" y="250" fill="#c9d1d9" text-anchor="end">Plesk</text>
    <rect x="160" y="236" width="509" height="26" rx="5" fill="#4a3b3b"/>
    <text x="679" y="254" fill="#8b949e">~800 MB</text>

    <!-- cPanel 1000 -->
    <text x="148" y="296" fill="#c9d1d9" text-anchor="end">cPanel &amp; WHM</text>
    <rect x="160" y="282" width="636" height="26" rx="5" fill="#5a3636"/>
    <text x="806" y="300" fill="#8b949e">~1 GB+</text>
  </g>

  <text x="32" y="340" fill="#6e7681" font-size="11">SafeGuard = measured working set. Others = representative figures for multi-daemon control planes; exact usage varies by version, account count &amp; config.</text>
</svg>
