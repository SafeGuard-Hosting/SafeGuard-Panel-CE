<svg width="920" height="480" viewBox="0 0 920 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect x="0" y="0" width="920" height="480" rx="16" fill="#0d1117" stroke="#1f2630" stroke-width="1"/>
  <text x="32" y="42" fill="#e6edf3" font-size="22" font-weight="700">CPU usage with nobody logged in</text>
  <text x="32" y="66" fill="#8b949e" font-size="13">An event-driven Go server sleeps when idle. Legacy panels run always-on polling daemons &amp; cron tickers.</text>

  <!-- gridlines + Y labels (%) -->
  <g stroke="#1f2630" stroke-width="1">
    <line x1="90" y1="360" x2="860" y2="360"/>
    <line x1="90" y1="304" x2="860" y2="304"/>
    <line x1="90" y1="248" x2="860" y2="248"/>
    <line x1="90" y1="173.3" x2="860" y2="173.3"/>
    <line x1="90" y1="80" x2="860" y2="80"/>
  </g>
  <g fill="#6e7681" font-size="11" text-anchor="end">
    <text x="80" y="364">0%</text>
    <text x="80" y="308">3%</text>
    <text x="80" y="252">6%</text>
    <text x="80" y="177.3">10%</text>
    <text x="80" y="84">15% CPU</text>
  </g>

  <!-- X axis -->
  <line x1="90" y1="360" x2="860" y2="360" stroke="#30363d" stroke-width="1.5"/>
  <g fill="#6e7681" font-size="11" text-anchor="middle">
    <text x="90" y="380">0s</text>
    <text x="218" y="380">10s</text>
    <text x="347" y="380">20s</text>
    <text x="475" y="380">30s</text>
    <text x="603" y="380">40s</text>
    <text x="732" y="380">50s</text>
    <text x="475" y="400" fill="#8b949e" font-size="12">60 seconds, zero users</text>
  </g>

  <!-- cPanel sawtooth (representative) -->
  <polyline points="90,313 167,313 193,173 218,313 347,313 372,183 398,313 526,313 552,173 578,313 706,313 732,178 757,313 860,313"
            fill="none" stroke="#ff7b72" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="200" y="166" fill="#ff7b72" font-size="12" font-weight="600">cPanel · daemon &amp; cron spikes</text>

  <!-- Plesk sawtooth (representative) -->
  <polyline points="90,332 244,332 270,248 295,332 449,332 475,248 501,332 655,332 680,248 706,332 860,332"
            fill="none" stroke="#d2a8ff" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="486" y="242" fill="#d2a8ff" font-size="12" font-weight="600">Plesk</text>

  <!-- SafeGuard flat 0% (measured) -->
  <line x1="90" y1="360" x2="860" y2="360" stroke="#2ee59d" stroke-width="4" stroke-linecap="round"/>
  <circle cx="90" cy="360" r="5.5" fill="#2ee59d"/>
  <text x="104" y="352" fill="#2ee59d" font-size="13" font-weight="700">▬ SafeGuard Panel — 0.00% measured (0 ms CPU over 10s idle)</text>

  <!-- legend -->
  <g font-size="12">
    <rect x="90" y="420" width="13" height="13" rx="3" fill="#2ee59d"/><text x="108" y="431" fill="#e6edf3" font-weight="600">SafeGuard Panel (measured)</text>
    <rect x="320" y="420" width="13" height="13" rx="3" fill="#ff7b72"/><text x="338" y="431" fill="#8b949e">cPanel</text>
    <rect x="410" y="420" width="13" height="13" rx="3" fill="#d2a8ff"/><text x="428" y="431" fill="#8b949e">Plesk</text>
    <text x="480" y="431" fill="#6e7681">· DirectAdmin sits between the two (lighter than both)</text>
  </g>
  <text x="90" y="462" fill="#6e7681" font-size="11">SafeGuard = measured. Competitor traces are representative of polling-daemon architectures, not benchmarked percentages.</text>
</svg>
