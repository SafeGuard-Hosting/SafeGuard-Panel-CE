<svg width="512" height="512" viewBox="-20 -20 552 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23C58A"/>
      <stop offset="1" stop-color="#15986B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.18"/>
    </linearGradient>
    <!-- subtle vertical sheen on the green fill -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0FB079" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#0FB079" stop-opacity="0"/>
    </linearGradient>
    <!-- bright green halo glow (the confirmed mark), plus a soft cast shadow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#23C58A" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#2EE59D" flood-opacity="0.8"/>
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0A4D32" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- rounded square base -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)" filter="url(#glow)"/>
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#sheen)"/>

  <!-- server cards: status dot, two text lines, ••• menu -->
  <g>
    <rect x="104" y="92" width="304" height="52" rx="16" fill="url(#card)"/>
    <circle cx="136" cy="118" r="11" fill="#FFFFFF" opacity="0.9"/>
    <rect x="158" y="106" width="124" height="9" rx="4.5" fill="#FFFFFF" opacity="0.8"/>
    <rect x="158" y="121" width="80" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="352" cy="118" r="5" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="371" cy="118" r="5" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="390" cy="118" r="5" fill="#FFFFFF" opacity="0.75"/>

    <rect x="104" y="156" width="304" height="52" rx="16" fill="url(#card)"/>
    <circle cx="136" cy="182" r="11" fill="#FFFFFF" opacity="0.9"/>
    <rect x="158" y="170" width="124" height="9" rx="4.5" fill="#FFFFFF" opacity="0.8"/>
    <rect x="158" y="185" width="80" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="352" cy="182" r="5" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="371" cy="182" r="5" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="390" cy="182" r="5" fill="#FFFFFF" opacity="0.75"/>

    <rect x="104" y="220" width="304" height="52" rx="16" fill="url(#card)"/>
    <circle cx="136" cy="246" r="11" fill="#FFFFFF" opacity="0.9"/>
    <rect x="158" y="234" width="124" height="9" rx="4.5" fill="#FFFFFF" opacity="0.8"/>
    <rect x="158" y="249" width="80" height="8" rx="4" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="352" cy="246" r="5" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="371" cy="246" r="5" fill="#FFFFFF" opacity="0.75"/>
    <circle cx="390" cy="246" r="5" fill="#FFFFFF" opacity="0.75"/>
  </g>

  <!-- lock, overlapping the lower server rows like the confirmed mark -->
  <g>
    <path d="M218 262 v-28 a38 38 0 0 1 76 0 v28"
          fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round"/>
    <rect x="196" y="258" width="120" height="96" rx="22" fill="#FFFFFF"/>
    <circle cx="256" cy="298" r="14" fill="#15986B"/>
    <rect x="248" y="306" width="16" height="26" rx="8" fill="#15986B"/>
  </g>

  <!-- SGP chip centered under the lock -->
  <g transform="translate(256,408)">
    <rect x="-62" y="-27" width="124" height="54" rx="14" fill="#0A4D32"/>
    <text x="0" y="11" text-anchor="middle"
          font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="36" font-weight="700" letter-spacing="6"><tspan fill="#FFFFFF">S</tspan><tspan fill="#3FD89B">G</tspan><tspan fill="#FFFFFF">P</tspan></text>
  </g>
</svg>
